name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build Next.js (standalone output)
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Assemble standalone deploy package
        run: |
          # Next.js standalone output needs public/ and .next/static/ copied in.
          mkdir -p web/.next/standalone/public web/.next/standalone/.next
          cp -r web/.next/static web/.next/standalone/.next/static
          # public/ may be empty at Wave 1 but copy it anyway for later assets
          [ -d web/public ] && cp -r web/public/. web/.next/standalone/public/ || true

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: reearth
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: web/.next/standalone

      - name: Smoke test
        run: |
          sleep 45
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://reearth.azurewebsites.net)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed"
