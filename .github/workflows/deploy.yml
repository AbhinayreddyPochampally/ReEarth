name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build Next.js (standalone output)
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Assemble standalone deploy package
        run: |
          # Next.js standalone output needs public/ and .next/static/ copied in.
          mkdir -p web/.next/standalone/public web/.next/standalone/.next
          cp -r web/.next/static web/.next/standalone/.next/static
          # public/ may be empty at Wave 1 but copy it anyway for later assets
          [ -d web/public ] && cp -r web/public/. web/.next/standalone/public/ || true

      - name: Deploy to Azure via Kudu zip API
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          # Parse ZipDeploy credentials from publish profile XML
          KUDU_USER=$(python3 -c "
          import xml.etree.ElementTree as ET, os, sys
          root = ET.fromstring(os.environ['PUBLISH_PROFILE'].strip())
          for p in root.findall('publishProfile'):
              if p.get('publishMethod') == 'ZipDeploy':
                  print(p.get('userName')); sys.exit(0)
          sys.exit(1)
          ")
          KUDU_PWD=$(python3 -c "
          import xml.etree.ElementTree as ET, os, sys
          root = ET.fromstring(os.environ['PUBLISH_PROFILE'].strip())
          for p in root.findall('publishProfile'):
              if p.get('publishMethod') == 'ZipDeploy':
                  print(p.get('userPWD')); sys.exit(0)
          sys.exit(1)
          ")
          echo "Credentials parsed. Creating deploy zip..."
          cd web/.next/standalone && zip -qr /tmp/deploy.zip . && cd ../../..
          echo "Uploading to Kudu (this takes ~30s)..."
          HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "https://reearth.scm.azurewebsites.net/api/zipdeploy" \
            -u "${KUDU_USER}:${KUDU_PWD}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/deploy.zip \
            --max-time 300)
          echo "Kudu response: $HTTP"
          cat /tmp/resp.txt
          [ "$HTTP" = "200" ] || [ "$HTTP" = "202" ] || exit 1

      - name: Smoke test
        run: |
          sleep 45
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://reearth.azurewebsites.net)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed"
