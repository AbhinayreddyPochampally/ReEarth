name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build Next.js (standalone output)
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Assemble standalone deploy package
        run: |
          # Next.js standalone output needs public/ and .next/static/ copied in.
          mkdir -p web/.next/standalone/public web/.next/standalone/.next
          cp -r web/.next/static web/.next/standalone/.next/static
          # public/ may be empty at Wave 1 but copy it anyway for later assets
          [ -d web/public ] && cp -r web/public/. web/.next/standalone/public/ || true

      - name: Deploy to Azure via Kudu zip API
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          # Parse ZipDeploy credentials with regex — robust to whitespace/BOM/extra lines in the secret.
          ZIP_BLOCK=$(printf '%s' "$PUBLISH_PROFILE" | grep -oP '<publishProfile[^>]*publishMethod="ZipDeploy"[^>]*>' || true)
          if [ -z "$ZIP_BLOCK" ]; then
            echo "ERROR: ZipDeploy profile not found in PUBLISH_PROFILE secret"
            echo "Secret length: ${#PUBLISH_PROFILE}"
            exit 1
          fi
          KUDU_USER=$(printf '%s' "$ZIP_BLOCK" | grep -oP 'userName="\K[^"]+')
          KUDU_PWD=$(printf '%s' "$ZIP_BLOCK" | grep -oP 'userPWD="\K[^"]+')
          if [ -z "$KUDU_USER" ] || [ -z "$KUDU_PWD" ]; then
            echo "ERROR: Could not extract credentials from ZipDeploy profile"
            exit 1
          fi
          echo "Credentials parsed (user length=${#KUDU_USER}, pwd length=${#KUDU_PWD}). Creating deploy zip..."
          cd web/.next/standalone && zip -qr /tmp/deploy.zip . && cd ../../..
          echo "Uploading to Kudu (this takes ~30s)..."
          HTTP=$(curl -s -o /tmp/resp.txt -w "%{http_code}" \
            -X POST "https://reearth.scm.azurewebsites.net/api/zipdeploy" \
            -u "${KUDU_USER}:${KUDU_PWD}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/deploy.zip \
            --max-time 300)
          echo "Kudu response: $HTTP"
          cat /tmp/resp.txt
          [ "$HTTP" = "200" ] || [ "$HTTP" = "202" ] || exit 1

      - name: Smoke test
        run: |
          sleep 45
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://reearth.azurewebsites.net)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed"
